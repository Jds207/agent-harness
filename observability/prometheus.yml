# Prometheus configuration for agent-harness
#
# Scrapes the agent's /metrics endpoint every 15 seconds.
# On macOS/Windows, `host.docker.internal` resolves to the host machine.
# On Linux, either:
#   - run the agent in a container on the same Docker network, or
#   - use `network_mode: host` for Prometheus, or
#   - replace `host.docker.internal` with your host IP.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "agent-harness"
    static_configs:
      - targets:
          - "host.docker.internal:8000"
          - "host.docker.internal:8001"
        labels:
          service: "agent-harness"
