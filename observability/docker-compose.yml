# Observability stack for agent-harness (local dev)
#
# Services:
#   - Prometheus:       scrapes /metrics from your agent (port 9090)
#   - Grafana:          dashboards & alerting               (port 3000)
#   - OTel Collector:   receives OTLP traces/metrics        (port 4317 gRPC, 4318 HTTP)
#   - Tempo:            distributed trace storage           (port 3200)
#
# Usage:
#   cd observability && docker compose up -d

services:
  # ── Prometheus ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: harness-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: harness-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped

  # ── OpenTelemetry Collector ───────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: harness-otel-collector
    volumes:
      - ./otel/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    restart: unless-stopped

  # ── Tempo (trace storage) ────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.5.0
    container_name: harness-tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API
      - "9095:9095"   # Tempo gRPC (internal)
    restart: unless-stopped

volumes:
  grafana-data:
  tempo-data:
